<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - NewsHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a class="logo" href="index.html"><img src="stackly-logo.webp" alt="NewsHub" style="height:64px;width:auto;vertical-align:middle;"></a>

            <div class="nav-menu" id="navMenu">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="categories.html">Categories</a>
                <a href="latest.html">Latest News</a>
                <a href="magazine.html">Magazine</a>
                <a href="blog.html">Blog</a>
                <a href="contact.html">Contact</a>
                <a href="signin.html" class="current">Sign In</a>
                <a href="register.html" class="nav-register">Register</a>
            </div>

            <button class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main id="content">
        <form class="signin-form" id="signinForm" novalidate>
            <h1>Sign In</h1>
            <div class="form-group">
                <input type="email" id="identifier" placeholder="Email Address" autocomplete="email">
                <div class="error-message" id="identifierError"></div>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                <div class="error-message" id="passwordError"></div>
            </div>
            <div class="form-group">
                <select id="role">
                    <option value="">Select Role</option>
                    <option value="Reader">Reader</option>
                    <option value="Editor">Editor</option>
                </select>
                <div class="error-message" id="roleError"></div>
            </div>
            <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <input type="checkbox" style="width: auto;">
                <span>Remember Me</span>
            </label>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">Sign In</button>
            <a href="404.html" class="read-more" style="display: block; width: 100%; text-align: center;">Forgot Password?</a>
            <p style="text-align: center; margin-top: 20px; font-size: 14px;">Don't have an account? <a href="register.html" class="read-more" style="padding: 0;">Register</a></p>
        </form>
    </main>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
